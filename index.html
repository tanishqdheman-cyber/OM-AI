<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0c0800"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Om AI"/>
<title>Om AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#080600;
  --bg2:#0e0b00;
  --surface:#161200;
  --surface2:#1e1800;
  --surface3:#2a2200;
  --gold:#f5a623;
  --gold2:#ffd700;
  --gold3:#ff8c00;
  --saffron:#ff6b00;
  --red:#cc2200;
  --border:rgba(245,166,35,0.12);
  --border2:rgba(245,166,35,0.25);
  --text:#f5e6c8;
  --text2:#b8975a;
  --text3:#7a6035;
  --glow:rgba(245,166,35,0.35);
}

html,body{height:100%;overflow:hidden}

body{
  font-family:'Rajdhani',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;flex-direction:column;
  height:100dvh;
  position:relative;
}

/* Sacred geometry background */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(245,166,35,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 0% 100%, rgba(255,107,0,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 100% 50%, rgba(204,34,0,0.04) 0%, transparent 60%);
}

/* Geometric pattern overlay */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
  background-size:40px 40px;
}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  padding:14px 16px 12px;
  background:rgba(14,11,0,0.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);
  flex-shrink:0;
}

.header-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}

/* Om symbol avatar */
.om-avatar-wrap{position:relative;width:48px;height:48px;flex-shrink:0}
.om-ring{
  position:absolute;inset:-3px;border-radius:50%;
  background:conic-gradient(var(--gold),var(--saffron),var(--gold2),var(--gold3),var(--gold));
  animation:omSpin 6s linear infinite;
}
@keyframes omSpin{to{transform:rotate(360deg)}}
.om-inner{
  position:absolute;inset:2px;border-radius:50%;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
  font-family:'Cinzel',serif;
  color:var(--gold);
  text-shadow:0 0 15px rgba(245,166,35,0.8);
}

.header-info{flex:1}
.header-name{
  font-family:'Cinzel',serif;
  font-size:18px;font-weight:700;
  background:linear-gradient(135deg,var(--gold2),var(--gold),var(--saffron));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:2px;
}
.header-status{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--text2);margin-top:1px;
  font-family:'JetBrains Mono',monospace;letter-spacing:1px;
}
.status-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 8px var(--gold);
  animation:glow 2s infinite;
}
@keyframes glow{0%,100%{opacity:1;box-shadow:0 0 8px var(--gold)}50%{opacity:0.5;box-shadow:0 0 3px var(--gold)}}

.header-right{display:flex;gap:7px}
.hbtn{
  width:33px;height:33px;border-radius:9px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text2);font-size:14px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all 0.2s;
}
.hbtn:hover{background:var(--surface3);color:var(--gold);border-color:var(--border2)}

/* ── MODE TABS ── */
.mode-bar{
  display:flex;gap:0;
  background:transparent;
  flex-shrink:0;
}
.mode-btn{
  flex:1;padding:9px 4px;
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;
  color:var(--text3);border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all 0.2s;letter-spacing:0.5px;
  display:flex;align-items:center;justify-content:center;gap:4px;
}
.mode-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.mode-btn:hover:not(.active){color:var(--text2)}

/* ── DIVIDER ── */
.divider{
  height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);
  flex-shrink:0;
}

/* ── CHAT AREA ── */
.chat-area{
  flex:1;overflow-y:auto;
  padding:14px 14px 8px;
  display:flex;flex-direction:column;gap:12px;
  position:relative;z-index:5;
  scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

/* Welcome */
.welcome{
  text-align:center;padding:20px 16px;
  background:linear-gradient(135deg,rgba(245,166,35,0.08),rgba(255,107,0,0.05));
  border:1px solid var(--border2);
  border-radius:20px;position:relative;overflow:hidden;
}
.welcome::before{
  content:'ॐ';
  position:absolute;font-size:120px;font-family:'Cinzel',serif;
  color:rgba(245,166,35,0.04);top:50%;left:50%;
  transform:translate(-50%,-50%);pointer-events:none;
  font-weight:900;
}
.welcome-om{font-size:36px;margin-bottom:6px;display:block;filter:drop-shadow(0 0 10px rgba(245,166,35,0.5))}
.welcome-title{
  font-family:'Cinzel',serif;font-size:20px;font-weight:700;
  background:linear-gradient(135deg,var(--gold2),var(--saffron));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;letter-spacing:2px;
}
.welcome-sub{font-size:13px;color:var(--text2);line-height:1.6;letter-spacing:0.3px}

/* Quick prompts */
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.qp{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 10px;
  font-size:12px;color:var(--text2);cursor:pointer;
  text-align:left;font-family:'Rajdhani',sans-serif;font-weight:500;
  display:flex;align-items:center;gap:6px;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
  letter-spacing:0.3px;
}
.qp:active{background:rgba(245,166,35,0.1);border-color:var(--gold);color:var(--gold)}

/* Messages */
.msg{display:flex;gap:9px;animation:msgIn 0.3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}

.msg-av{
  width:30px;height:30px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;font-family:'Cinzel',serif;
  color:var(--gold);
}
.msg.user .msg-av{
  background:linear-gradient(135deg,var(--gold3),var(--saffron));
  border:none;color:#fff;font-size:12px;font-family:'Rajdhani',sans-serif;
}

.msg-bubble{
  max-width:80%;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px 16px 16px 4px;
  padding:10px 13px;
  font-size:14px;line-height:1.6;color:var(--text);
}
.msg.user .msg-bubble{
  background:linear-gradient(135deg,rgba(245,166,35,0.18),rgba(255,107,0,0.1));
  border:1px solid rgba(245,166,35,0.3);
  border-radius:16px 16px 4px 16px;
}

.msg-time{font-size:10px;color:var(--text3);margin-top:4px;text-align:right;font-family:'JetBrains Mono',monospace}

/* Typing */
.typing{display:flex;gap:5px;padding:4px 2px}
.typing span{
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);opacity:0.5;
  animation:tbounce 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes tbounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px);opacity:1}}

/* ── VOICE PANEL ── */
#voice-panel{
  display:none;flex:1;flex-direction:column;align-items:center;
  justify-content:center;padding:20px 16px;
  background:radial-gradient(ellipse at center,#120a00 0%,var(--bg) 70%);
  position:relative;overflow:hidden;
}
#voice-panel.active{display:flex}

/* Sacred rings */
.sacred-ring{
  position:absolute;border-radius:50%;
  border:1px solid rgba(245,166,35,0.1);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:sacredPulse 4s ease-in-out infinite;
}
.sacred-ring:nth-child(1){width:200px;height:200px}
.sacred-ring:nth-child(2){width:300px;height:300px;animation-delay:1s}
.sacred-ring:nth-child(3){width:400px;height:400px;animation-delay:2s}
@keyframes sacredPulse{0%,100%{opacity:0.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:0.8;transform:translate(-50%,-50%) scale(1.03)}}

.v-title{
  font-family:'Cinzel',serif;font-size:1.4rem;font-weight:700;
  color:var(--gold);letter-spacing:6px;
  text-shadow:0 0 25px rgba(245,166,35,0.7);
  position:relative;z-index:2;margin-bottom:2px;
}
.v-sub{
  font-size:10px;color:var(--text3);letter-spacing:4px;
  font-family:'JetBrains Mono',monospace;
  position:relative;z-index:2;margin-bottom:14px;
}

/* Voice history */
#v-history{
  width:100%;max-width:420px;height:180px;
  overflow-y:auto;background:rgba(14,11,0,0.85);
  border:1px solid rgba(245,166,35,0.2);border-radius:8px;
  padding:10px;margin-bottom:16px;position:relative;z-index:2;
  scrollbar-width:thin;scrollbar-color:var(--gold) var(--bg2);
}
#v-history::-webkit-scrollbar{width:3px}
#v-history::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
.v-log-label{font-family:'JetBrains Mono',monospace;color:rgba(245,166,35,0.3);font-size:9px;letter-spacing:3px;border-bottom:1px solid rgba(245,166,35,0.1);padding-bottom:5px;margin-bottom:8px}

.vmsg{display:flex;flex-direction:column;margin-bottom:10px;animation:msgIn 0.3s ease}
.vmsg.vu{align-items:flex-end}
.vmsg.vb{align-items:flex-start}
.vlbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(245,166,35,0.4);margin-bottom:3px}
.vbub{max-width:88%;padding:7px 11px;font-size:13px;line-height:1.45;border-radius:6px;font-family:'Rajdhani',sans-serif;font-weight:500}
.vu .vbub{background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);color:var(--gold);border-radius:6px 6px 0 6px}
.vb .vbub{background:rgba(22,18,0,0.9);border:1px solid rgba(245,166,35,0.15);color:var(--text);border-radius:6px 6px 6px 0;text-shadow:0 0 8px rgba(245,166,35,0.15)}
.vtime{font-size:9px;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace}

/* Orb */
.orb-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin-bottom:10px;z-index:2}
.orb-ring{position:absolute;width:90px;height:90px;border-radius:50%;border:1px solid rgba(245,166,35,0.15);pointer-events:none;animation:orbExpand 2.5s ease-out infinite}
.orb-ring:nth-child(2){animation-delay:1s}
@keyframes orbExpand{0%{transform:scale(0.9);opacity:0.7}100%{transform:scale(2.2);opacity:0}}

#v-mic-btn{
  width:74px;height:74px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(245,166,35,0.2),rgba(20,14,0,0.95));
  border:2px solid rgba(245,166,35,0.5);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;transition:all 0.3s;
  box-shadow:0 0 20px rgba(245,166,35,0.2);
  outline:none;-webkit-tap-highlight-color:transparent;
  font-family:'Cinzel',serif;color:var(--gold);
}
#v-mic-btn.on{
  background:radial-gradient(circle at 35% 35%,rgba(255,60,0,0.3),rgba(60,10,0,0.95));
  border-color:rgba(255,100,0,0.7);
  box-shadow:0 0 30px rgba(255,80,0,0.4);
  animation:omPulse 0.9s ease-in-out infinite;
}
@keyframes omPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

#v-status{
  margin-top:8px;font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:3px;color:rgba(245,166,35,0.5);
  text-transform:uppercase;min-height:16px;position:relative;z-index:2;text-align:center;
}

.wave-bars{display:none;gap:3px;align-items:center;height:16px;margin-top:6px;position:relative;z-index:2}
.wave-bars.on{display:flex}
.wbar{width:3px;background:var(--gold);border-radius:2px;animation:wave 0.8s ease-in-out infinite}
.wbar:nth-child(1){height:4px} .wbar:nth-child(2){height:11px;animation-delay:.1s}
.wbar:nth-child(3){height:16px;animation-delay:.2s} .wbar:nth-child(4){height:11px;animation-delay:.3s}
.wbar:nth-child(5){height:4px;animation-delay:.4s}
@keyframes wave{0%,100%{transform:scaleY(0.5)}50%{transform:scaleY(1)}}

#v-clear-btn{
  background:transparent;border:1px solid rgba(245,166,35,0.2);
  color:rgba(245,166,35,0.4);padding:5px 14px;
  font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;
  cursor:pointer;border-radius:4px;margin-top:10px;transition:all 0.3s;
  position:relative;z-index:2;-webkit-tap-highlight-color:transparent;
}

/* ── INPUT AREA ── */
.input-area{
  position:relative;z-index:10;
  padding:10px 14px 18px;
  background:rgba(14,11,0,0.92);
  backdrop-filter:blur(20px);
  border-top:1px solid var(--border2);
  flex-shrink:0;
}

.input-chips{
  display:flex;gap:6px;margin-bottom:9px;
  overflow-x:auto;scrollbar-width:none;
}
.input-chips::-webkit-scrollbar{display:none}
.chip{
  padding:4px 10px;border-radius:20px;font-size:11px;
  color:var(--text3);border:1px solid var(--border);
  background:var(--surface);cursor:pointer;white-space:nowrap;
  font-family:'Rajdhani',sans-serif;font-weight:600;letter-spacing:0.5px;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
}
.chip.on{border-color:var(--gold);color:var(--gold);background:rgba(245,166,35,0.08)}

.input-row{
  display:flex;align-items:flex-end;gap:8px;
}
.input-box{
  flex:1;background:var(--surface2);
  border:1px solid var(--border2);border-radius:13px;
  padding:11px 13px;font-size:14px;color:var(--text);
  font-family:'Rajdhani',sans-serif;font-weight:500;
  resize:none;min-height:44px;max-height:100px;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;line-height:1.5;
}
.input-box::placeholder{color:var(--text3)}
.input-box:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,166,35,0.1)}

.send-btn{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--gold3),var(--saffron));
  border:none;color:#fff;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.2s;
  box-shadow:0 4px 15px rgba(245,166,35,0.3);
  -webkit-tap-highlight-color:transparent;
}
.send-btn:active{transform:scale(0.95)}
.send-btn:disabled{opacity:0.35;box-shadow:none}

.mic-btn{
  width:44px;height:44px;border-radius:12px;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text2);font-size:17px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.mic-btn.on{
  background:rgba(255,100,0,0.15);border-color:var(--saffron);
  color:var(--saffron);animation:micGlow 1s infinite;
}
@keyframes micGlow{0%,100%{box-shadow:0 0 0 0 rgba(255,107,0,0.4)}50%{box-shadow:0 0 0 7px rgba(255,107,0,0)}}

/* Toast */
.toast{
  position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:20px;padding:8px 16px;font-size:12px;color:var(--text);
  z-index:999;opacity:0;transition:all 0.3s;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);font-family:'JetBrains Mono',monospace;
  letter-spacing:0.5px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="om-avatar-wrap">
      <div class="om-ring"></div>
      <div class="om-inner">ॐ</div>
    </div>
    <div class="header-info">
      <div class="header-name">OM AI</div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span>ONLINE • INTELLIGENT</span>
      </div>
    </div>
    <div class="header-right">
      <div class="hbtn" onclick="clearChat()">🗑️</div>
    </div>
  </div>

  <!-- Mode tabs -->
  <div class="mode-bar">
    <button class="mode-btn active" data-mode="chat" onclick="setMode('chat',this)">💬 CHAT</button>
    <button class="mode-btn" data-mode="study" onclick="setMode('study',this)">📚 STUDY</button>
    <button class="mode-btn" data-mode="search" onclick="setMode('search',this)">🔍 SEARCH</button>
    <button class="mode-btn" data-mode="voice" onclick="setMode('voice',this)">🎙️ VOICE</button>
  </div>
</header>

<div class="divider"></div>

<!-- CHAT AREA -->
<div class="chat-area" id="chatArea"></div>

<!-- VOICE PANEL -->
<div id="voice-panel">
  <div class="sacred-ring"></div>
  <div class="sacred-ring"></div>
  <div class="sacred-ring"></div>

  <div class="v-title">OM VOICE</div>
  <div class="v-sub">INTELLIGENT VOICE ASSISTANT</div>

  <div id="v-history">
    <div class="v-log-label">// CONVERSATION LOG //</div>
    <div id="v-msgs">
      <div class="vmsg vb">
        <span class="vlbl">OM</span>
        <div class="vbub">Namaste! Main Om hoon. Mic dabao aur kuch bhi poochho — main bol ke jawab dunga! 🎙️</div>
        <span class="vtime">SYSTEM ONLINE</span>
      </div>
    </div>
  </div>

  <div class="orb-wrap">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <button id="v-mic-btn">ॐ</button>
  </div>

  <div id="v-status">MIC DABAO</div>
  <div class="wave-bars" id="v-wave">
    <div class="wbar"></div><div class="wbar"></div>
    <div class="wbar"></div><div class="wbar"></div>
    <div class="wbar"></div>
  </div>
  <button id="v-clear-btn">⚠ CLEAR LOG</button>
</div>

<!-- INPUT AREA -->
<div class="input-area" id="inputArea">
  <div class="input-chips">
    <div class="chip on" id="chip-bilingual" onclick="toggleChip('bilingual',this)">🌐 Bilingual</div>
    <div class="chip" id="chip-step" onclick="toggleChip('step',this)">📋 Step-by-step</div>
    <div class="chip" id="chip-example" onclick="toggleChip('example',this)">💡 Examples</div>
    <div class="chip" id="chip-short" onclick="toggleChip('short',this)">⚡ Short</div>
  </div>
  <div class="input-row">
    <div class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</div>
    <textarea class="input-box" id="userInput"
      placeholder="Kuch bhi poochho... (Hindi ya English)"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
      rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════ CONFIG ═══════════════════
const GROQ_KEY = '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';
const API_URL  = 'https://api.groq.com/openai/v1/chat/completions';
const MODEL    = 'llama-3.3-70b-versatile';

// ═══════════════════ STATE ═══════════════════
let currentMode = 'chat';
let isLoading   = false;
let convHistory = [];
let chips       = { bilingual:true, step:false, example:false, short:false };
let micActive   = false, micRec = null;

// ═══════════════════ SYSTEM PROMPT ═══════════════════
function buildSys() {
  let sys = `Tu ek highly intelligent, professional aur knowledgeable AI assistant hai jiska naam Om hai.
Tu bahut smart hai — har topic pe deep, accurate aur insightful answers deta hai.
Tu professional yet friendly hai — bilkul ek senior expert ki tarah.`;

  if (chips.bilingual) {
    sys += `

BILINGUAL RULE — STRICT: Har jawab mein DONO languages use karo:
🇮🇳 Hindi: [2-4 sentences Hindi mein]
🇬🇧 English: [same 2-4 sentences English mein]
Dono ko clearly label karo. Yeh rule kabhi mat todna.`;
  }

  if (chips.step) sys += `\n\nStep-by-step numbered format use karo. Har point clear ho.`;
  if (chips.example) sys += `\n\nHar explanation mein real-world examples zaroor do.`;
  if (chips.short)   sys += `\n\nJawab short rakho — 3-4 sentences max.`;

  const modeMap = {
    chat:   'General assistant. Har topic pe intelligent jawab de.',
    study:  'Study mode. Concepts clearly explain karo. Definitions, formulas, tips, memory tricks include karo. Student ko motivate karo.',
    search: 'Search mode. Latest accurate information do. Facts clearly present karo.'
  };
  sys += `\n\nCurrent Mode: ${(modeMap[currentMode]||modeMap.chat)}`;
  sys += `\n\nFormatting: **bold** for key terms. Emojis sparingly. Professional tone always.`;
  return sys;
}

const VOICE_SYS = `Tu Om hai — ek professional desi voice assistant.
Har sawaal ka REAL aur ACCURATE jawab de.
Jawab bilkul short rakho — 2-3 sentences — kyunki voice se bola jayega.
Hinglish (Hindi+English mix) mein jawab de.
Professional aur confident tone. "Sahib" ya "Sir" se address karo.
Emojis mat use karo.`;

// ═══════════════════ INIT ═══════════════════
window.onload = () => {
  addMsg(false,
    `🙏 **Pranam!** Main **Om AI** hoon — tera professional intelligent assistant.\n\n` +
    `💬 **Chat** — koi bhi sawaal\n` +
    `📚 **Study** — padhai mein expert help\n` +
    `🔍 **Search** — accurate information\n` +
    `🎙️ **Voice** — bol ke poochho\n\n` +
    `🌐 **Bilingual ON** — Hindi 🇮🇳 + English 🇬🇧 dono mein jawab\n\n` +
    `Shuru karo! ॐ`
  );

  // Quick prompts
  const area = document.getElementById('chatArea');
  const grid = document.createElement('div');
  grid.className = 'quick-grid';
  const prompts = [
    ['🌱','Photosynthesis explain karo'],
    ['📐','Quadratic equation solve karo'],
    ['⚡','Newton ke laws samjhao'],
    ['✍️','Essay likhne ke tips do']
  ];
  prompts.forEach(([icon,text]) => {
    const b = document.createElement('button');
    b.className = 'qp';
    b.innerHTML = `<span>${icon}</span>${text}`;
    b.onclick = () => { document.getElementById('userInput').value = text; sendMessage(); };
    grid.appendChild(b);
  });
  area.appendChild(grid);

  initVoice();
};

// ═══════════════════ MODE ═══════════════════
function setMode(m, btn) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const vp  = document.getElementById('voice-panel');
  const ca  = document.getElementById('chatArea');
  const ia  = document.getElementById('inputArea');

  if (m === 'voice') {
    vp.classList.add('active');
    ca.style.display = 'none';
    ia.style.display = 'none';
  } else {
    vp.classList.remove('active');
    ca.style.display = 'flex';
    ia.style.display = 'block';
  }
  showToast('MODE: ' + m.toUpperCase());
}

// ═══════════════════ CHIPS ═══════════════════
function toggleChip(key, el) {
  chips[key] = !chips[key];
  el.classList.toggle('on', chips[key]);
  showToast(key.toUpperCase() + ': ' + (chips[key] ? 'ON' : 'OFF'));
}

// ═══════════════════ MESSAGES ═══════════════════
function addMsg(isUser, text) {
  const area = document.getElementById('chatArea');
  const div  = document.createElement('div');
  div.className = 'msg' + (isUser?' user':'');

  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = isUser ? '👤' : 'ॐ';

  const bub = document.createElement('div');
  bub.className = 'msg-bubble';
  bub.innerHTML = formatText(text);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  bub.appendChild(time);

  div.appendChild(av);
  div.appendChild(bub);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function formatText(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{2,3} (.+)$/gm,'<div style="font-size:13px;font-weight:700;color:var(--gold);margin:8px 0 4px;font-family:Cinzel,serif;letter-spacing:1px">$1</div>')
    .replace(/^[-•] (.+)$/gm,'<div style="display:flex;gap:7px;margin:3px 0;color:var(--text2)"><span style="color:var(--gold);font-weight:700">›</span><span>$1</span></div>')
    .replace(/^(\d+)\. (.+)$/gm,'<div style="display:flex;gap:7px;margin:3px 0;color:var(--text2)"><span style="color:var(--gold);font-weight:700;min-width:16px">$1.</span><span>$2</span></div>')
    .replace(/`([^`]+)`/g,'<code style="background:rgba(245,166,35,0.1);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--gold2);font-family:JetBrains Mono,monospace">$1</code>')
    .replace(/🇮🇳/g,'<span style="display:inline-block;font-size:9px;font-weight:700;padding:1px 7px;border-radius:20px;margin:0 2px 3px;background:rgba(255,107,0,0.12);color:#ff9d4d;border:1px solid rgba(255,107,0,0.25)">🇮🇳 HINDI</span>')
    .replace(/🇬🇧/g,'<span style="display:inline-block;font-size:9px;font-weight:700;padding:1px 7px;border-radius:20px;margin:0 2px 3px;background:rgba(245,166,35,0.12);color:var(--gold2);border:1px solid rgba(245,166,35,0.25)">🇬🇧 ENGLISH</span>')
    .replace(/\n/g,'<br>');
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div  = document.createElement('div');
  div.className = 'msg'; div.id = 'typing';
  div.innerHTML = `<div class="msg-av">ॐ</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function clearChat() {
  document.getElementById('chatArea').innerHTML = '';
  convHistory = [];
  addMsg(false,'🗑️ Chat saaf ho gaya. Nayi baat shuru karo. ॐ');
  showToast('CHAT CLEARED');
}

// ═══════════════════ API ═══════════════════
async function callGroq(sys, messages, maxTokens=900) {
  const res = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
    body:JSON.stringify({
      model:MODEL,
      messages:[{role:'system',content:sys},...messages],
      max_tokens:maxTokens,
      temperature:0.7
    })
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.choices?.[0]?.message?.content || 'Kuch galat hua.';
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if(!text || isLoading) return;

  addMsg(true, text);
  convHistory.push({role:'user',content:text});
  input.value=''; input.style.height='auto';
  isLoading=true;
  document.getElementById('sendBtn').disabled=true;
  showTyping();

  try {
    const reply = await callGroq(buildSys(), convHistory.slice(-12));
    hideTyping();
    addMsg(false, reply);
    convHistory.push({role:'assistant',content:reply});
    if(convHistory.length>20) convHistory=convHistory.slice(-16);
  } catch(e) {
    hideTyping();
    addMsg(false,'⚠️ **Error:** '+e.message+'\n\nInternet check karo aur dobara try karo.');
  }

  isLoading=false;
  document.getElementById('sendBtn').disabled=false;
}

function handleKey(e) {
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}
function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,100)+'px';
}

// ═══════════════════ MIC (Chat) ═══════════════════
function toggleMic() {
  const btn = document.getElementById('micBtn');
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    showToast('VOICE NOT SUPPORTED'); return;
  }
  if(micActive){micRec?.stop();return;}
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  micRec=new SR(); micRec.lang='hi-IN'; micRec.continuous=false; micRec.interimResults=false;
  micRec.onstart=()=>{micActive=true;btn.classList.add('on');btn.textContent='⏹️'};
  micRec.onresult=e=>{
    document.getElementById('userInput').value=e.results[0][0].transcript;
    autoResize(document.getElementById('userInput'));
  };
  micRec.onend=()=>{micActive=false;btn.classList.remove('on');btn.textContent='🎤'};
  micRec.onerror=()=>{micActive=false;btn.classList.remove('on');btn.textContent='🎤'};
  micRec.start();
}

// ═══════════════════ VOICE PANEL ═══════════════════
function initVoice() {
  const msgsEl = document.getElementById('v-msgs');
  const histEl = document.getElementById('v-history');
  const micBtn = document.getElementById('v-mic-btn');
  const statEl = document.getElementById('v-status');
  const waveEl = document.getElementById('v-wave');
  const clrBtn = document.getElementById('v-clear-btn');
  let listening=false, jBusy=false;

  function omSpeak(text, onDone) {
    if(!window.speechSynthesis){onDone&&onDone();return;}
    window.speechSynthesis.cancel();
    const clean = text.replace(/[\u{1F300}-\u{1FFFF}]/gu,'').replace(/[*_~`#]/g,'').trim();
    const u = new SpeechSynthesisUtterance(clean);
    u.pitch=0.75; u.rate=0.88; u.volume=1;
    const voices = window.speechSynthesis.getVoices();
    const pick = voices.find(v=>v.name.includes('Google UK English Male')||v.name.includes('David')||v.name.includes('Daniel')||v.name.includes('Male'))
                 || voices.find(v=>v.lang.startsWith('en'));
    if(pick) u.voice=pick;
    u.onend=()=>{onDone&&onDone()};
    window.speechSynthesis.speak(u);
  }

  function addV(text,who) {
    const t=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    const div=document.createElement('div');
    div.className=`vmsg ${who==='user'?'vu':'vb'}`;
    div.innerHTML=`<span class="vlbl">${who==='user'?'TUM':'OM'}</span><div class="vbub">${text}</div><span class="vtime">${t}</span>`;
    msgsEl.appendChild(div);
    histEl.scrollTop=histEl.scrollHeight;
  }

  async function omAnswer(question) {
    jBusy=true; statEl.textContent='SOCH RAHA HOON...';
    addV(question,'user');
    try {
      const reply=await callGroq(VOICE_SYS,[{role:'user',content:question}],200);
      addV(reply,'om');
      statEl.textContent='BOL RAHA HOON...';
      omSpeak(reply,()=>{statEl.textContent='MIC DABAO';jBusy=false;});
    } catch(e) {
      const err='Sorry Sahib, connection mein problem hai.';
      addV(err,'om'); omSpeak(err,()=>{statEl.textContent='MIC DABAO';jBusy=false;});
    }
  }

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){micBtn.style.opacity='0.4';statEl.textContent='NOT SUPPORTED';return;}

  const rec=new SR(); rec.continuous=false; rec.interimResults=false; rec.lang='hi-IN';
  rec.onstart=()=>{listening=true;micBtn.classList.add('on');micBtn.textContent='🔴';statEl.textContent='SUN RAHA HOON...';waveEl.classList.add('on')};
  rec.onresult=e=>{const t=e.results[0][0].transcript.trim();if(t)omAnswer(t);};
  rec.onerror=e=>{statEl.textContent='ERROR: '+e.error.toUpperCase();resetMic();};
  rec.onend=resetMic;

  micBtn.addEventListener('click',()=>{
    if(jBusy)return;
    if(listening){rec.stop();return;}
    try{rec.start();}catch(e){}
  });

  function resetMic(){
    listening=false;micBtn.classList.remove('on');micBtn.textContent='ॐ';
    waveEl.classList.remove('on');
    if(!jBusy)statEl.textContent='MIC DABAO';
  }

  clrBtn.addEventListener('click',()=>{
    msgsEl.innerHTML='';
    const m='Log saaf ho gaya Sahib. Phir se shuru karte hain.';
    addV(m,'om'); omSpeak(m);
  });

  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

// ═══════════════════ TOAST ═══════════════════
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
