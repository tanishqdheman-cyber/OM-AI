<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#00ff88"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>StockGuru AI</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020d06;
  --bg2:#041a0c;
  --surface:#071f0f;
  --surface2:#0a2914;
  --surface3:#0e3318;
  --green:#00ff88;
  --green2:#00cc66;
  --green3:#009944;
  --red:#ff3355;
  --yellow:#ffcc00;
  --blue:#00aaff;
  --border:rgba(0,255,136,0.12);
  --border2:rgba(0,255,136,0.25);
  --text:#ccffe8;
  --text2:#66bb8a;
  --text3:#336644;
  --glow:rgba(0,255,136,0.3);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Exo 2',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100dvh;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(0,255,136,0.07) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 0% 100%,rgba(0,204,102,0.05) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 100% 50%,rgba(255,51,85,0.04) 0%,transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,255,136,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,136,0.02) 1px,transparent 1px);
  background-size:30px 30px;
}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  padding:12px 14px 10px;
  background:rgba(4,26,12,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border2);
  flex-shrink:0;
}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo-wrap{position:relative;width:44px;height:44px;flex-shrink:0}
.logo-ring{position:absolute;inset:-2px;border-radius:10px;background:conic-gradient(var(--green),var(--yellow),var(--red),var(--green));animation:spin 5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-inner{
  position:absolute;inset:2px;border-radius:8px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:18px;font-weight:900;
  color:var(--green);text-shadow:0 0 10px var(--green);
}
.header-info{flex:1}
.header-name{
  font-family:'Orbitron',monospace;font-size:15px;font-weight:700;
  background:linear-gradient(90deg,var(--green),var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:1px;
}
.header-sub{font-size:10px;color:var(--text2);font-family:'Share Tech Mono',monospace;letter-spacing:1px;margin-top:1px}
.live-badge{
  display:flex;align-items:center;gap:4px;
  background:rgba(0,255,136,0.08);border:1px solid var(--border2);
  border-radius:20px;padding:3px 8px;font-size:10px;
  font-family:'Share Tech Mono',monospace;color:var(--green);
}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* Market ticker */
.ticker{
  display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;
  padding:2px 0;
}
.ticker::-webkit-scrollbar{display:none}
.tick{
  display:flex;align-items:center;gap:5px;
  font-family:'Share Tech Mono',monospace;font-size:11px;
  white-space:nowrap;flex-shrink:0;
}
.tick-name{color:var(--text2)}
.tick-val{font-weight:600}
.up{color:var(--green)}
.down{color:var(--red)}

/* ── MODE TABS ── */
.mode-bar{
  position:relative;z-index:10;
  display:flex;overflow-x:auto;scrollbar-width:none;
  background:rgba(4,26,12,0.8);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);flex-shrink:0;
  padding:0 10px;
}
.mode-bar::-webkit-scrollbar{display:none}
.mode-btn{
  padding:9px 12px;font-size:11px;font-weight:600;
  color:var(--text3);border:none;background:none;cursor:pointer;
  white-space:nowrap;border-bottom:2px solid transparent;
  transition:all 0.2s;font-family:'Exo 2',sans-serif;letter-spacing:0.5px;
  display:flex;align-items:center;gap:4px;
}
.mode-btn.active{color:var(--green);border-bottom-color:var(--green)}
.mode-btn:hover:not(.active){color:var(--text2)}

/* ── CHAT ── */
.chat-area{
  flex:1;overflow-y:auto;padding:12px 12px 6px;
  display:flex;flex-direction:column;gap:10px;
  position:relative;z-index:5;scroll-behavior:smooth;
}
.chat-area::-webkit-scrollbar{width:3px}
.chat-area::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

/* Welcome */
.welcome{
  background:linear-gradient(135deg,rgba(0,255,136,0.08),rgba(255,204,0,0.05));
  border:1px solid var(--border2);border-radius:16px;padding:16px;
  text-align:center;position:relative;overflow:hidden;
}
.welcome::before{
  content:'📈';position:absolute;font-size:100px;
  top:50%;left:50%;transform:translate(-50%,-50%);
  opacity:0.04;pointer-events:none;
}
.welcome-title{
  font-family:'Orbitron',monospace;font-size:18px;font-weight:700;
  background:linear-gradient(90deg,var(--green),var(--yellow));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:4px;
}
.welcome-sub{font-size:12px;color:var(--text2);line-height:1.6}

/* Quick topics */
.topics{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.topic{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:9px 10px;font-size:12px;color:var(--text2);cursor:pointer;
  text-align:left;font-family:'Exo 2',sans-serif;font-weight:500;
  display:flex;align-items:center;gap:6px;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.topic:active{background:rgba(0,255,136,0.1);border-color:var(--green);color:var(--green)}

/* Messages */
.msg{display:flex;gap:8px;animation:msgIn 0.3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.msg-av{
  width:28px;height:28px;border-radius:7px;
  background:var(--surface2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;font-family:'Orbitron',monospace;color:var(--green);
}
.msg.user .msg-av{background:linear-gradient(135deg,var(--green3),var(--green2));border:none;color:#000;font-size:11px}
.msg-bubble{
  max-width:82%;background:var(--surface);border:1px solid var(--border);
  border-radius:14px 14px 14px 4px;padding:10px 13px;
  font-size:13px;line-height:1.6;color:var(--text);
}
.msg.user .msg-bubble{
  background:linear-gradient(135deg,rgba(0,255,136,0.15),rgba(0,204,102,0.08));
  border:1px solid rgba(0,255,136,0.3);border-radius:14px 14px 4px 14px;
}
.msg-time{font-size:10px;color:var(--text3);margin-top:4px;text-align:right;font-family:'Share Tech Mono',monospace}

/* Uploaded image preview */
.img-preview{max-width:200px;border-radius:10px;border:1px solid var(--border2);margin-bottom:6px;display:block}

/* Typing */
.typing{display:flex;gap:5px;padding:3px 0}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--green);opacity:0.5;animation:tb 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px);opacity:1}}

/* ── KNOWLEDGE PANEL ── */
.know-panel{
  flex:1;overflow-y:auto;padding:12px;
  display:none;flex-direction:column;gap:10px;
  position:relative;z-index:5;
}
.know-panel.active{display:flex}
.know-card{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;cursor:pointer;transition:all 0.2s;
}
.know-card:active{border-color:var(--green)}
.know-header{
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
}
.know-icon{font-size:20px}
.know-title{font-size:14px;font-weight:700;color:var(--green);font-family:'Exo 2',sans-serif}
.know-sub{font-size:11px;color:var(--text2);margin-top:1px}
.know-body{padding:12px 14px;font-size:12px;color:var(--text2);line-height:1.7;display:none}
.know-body.open{display:block}
.know-point{display:flex;gap:7px;margin-bottom:6px;color:var(--text2)}
.know-point::before{content:'▸';color:var(--green);flex-shrink:0;font-size:11px;margin-top:1px}
.candle-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.candle-chip{
  padding:5px 10px;border-radius:20px;font-size:11px;font-weight:600;
  border:1px solid var(--border2);background:rgba(0,255,136,0.05);
  color:var(--green);font-family:'Share Tech Mono',monospace;
}
.candle-chip.bear{border-color:rgba(255,51,85,0.3);background:rgba(255,51,85,0.05);color:var(--red)}

/* ── INPUT ── */
.input-area{
  position:relative;z-index:10;
  padding:10px 12px 16px;
  background:rgba(4,26,12,0.95);backdrop-filter:blur(20px);
  border-top:1px solid var(--border2);flex-shrink:0;
}
.input-tools{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;scrollbar-width:none}
.input-tools::-webkit-scrollbar{display:none}
.tool{
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
  color:var(--text3);border:1px solid var(--border);background:var(--surface);
  cursor:pointer;white-space:nowrap;font-family:'Exo 2',sans-serif;
  transition:all 0.2s;-webkit-tap-highlight-color:transparent;
}
.tool.on{border-color:var(--green);color:var(--green);background:rgba(0,255,136,0.08)}

/* Image upload preview bar */
.img-bar{
  display:none;align-items:center;gap:8px;
  margin-bottom:8px;padding:7px 10px;
  background:rgba(0,255,136,0.06);border:1px solid var(--border2);
  border-radius:10px;
}
.img-bar.show{display:flex}
.img-thumb{width:36px;height:36px;border-radius:6px;object-fit:cover;border:1px solid var(--border2)}
.img-name{font-size:11px;color:var(--text2);flex:1;font-family:'Share Tech Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.img-remove{color:var(--red);font-size:16px;cursor:pointer;flex-shrink:0}

.input-row{display:flex;align-items:flex-end;gap:8px}
.input-box{
  flex:1;background:var(--surface2);border:1px solid var(--border2);border-radius:12px;
  padding:11px 13px;font-size:14px;color:var(--text);font-family:'Exo 2',sans-serif;
  resize:none;min-height:44px;max-height:100px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;line-height:1.5;
}
.input-box::placeholder{color:var(--text3)}
.input-box:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(0,255,136,0.08)}
.send-btn{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--green3),var(--green2));
  border:none;color:#000;font-size:18px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.2s;
  box-shadow:0 4px 15px rgba(0,255,136,0.3);
  -webkit-tap-highlight-color:transparent;
}
.send-btn:active{transform:scale(0.95)}
.send-btn:disabled{opacity:0.3;box-shadow:none}
.upload-btn{
  width:44px;height:44px;border-radius:12px;
  background:var(--surface2);border:1px solid var(--border2);
  color:var(--text2);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.upload-btn:active{background:rgba(0,255,136,0.1);border-color:var(--green);color:var(--green)}
#fileInput{display:none}

.toast{
  position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:20px;padding:7px 16px;font-size:11px;color:var(--text);
  z-index:999;opacity:0;transition:all 0.3s;white-space:nowrap;
  font-family:'Share Tech Mono',monospace;letter-spacing:0.5px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

// ═══════ KNOWLEDGE PANELS ═══════
function buildKnowledgePanels() {
  Object.keys(knowledgeData).forEach(key => {
    const panel = document.getElementById('panel-'+key);
    if(!panel) return;
    knowledgeData[key].forEach((item,i) => {
      const card = document.createElement('div');
      card.className = 'know-card';
      card.innerHTML = `
        <div class="know-header" onclick="toggleCard(this)">
          <span class="know-icon">${item.icon}</span>
          <div>
            <div class="know-title">${item.title}</div>
            <div class="know-sub">${item.sub}</div>
          </div>
          <span style="margin-left:auto;color:var(--text3);font-size:16px">›</span>
        </div>
        <div class="know-body">${item.content}</div>`;
      panel.appendChild(card);
    });

    // Ask AI button
    const askBtn = document.createElement('button');
    askBtn.style.cssText = 'background:rgba(0,255,136,0.08);border:1px solid var(--border2);border-radius:10px;padding:11px;color:var(--green);font-family:Exo 2,sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%;margin-top:4px;-webkit-tap-highlight-color:transparent';
    askBtn.textContent = '💬 Is topic ke baare mein AI se poochho';
    askBtn.onclick = () => { setMode('chat', document.querySelector('.mode-btn')); };
    panel.appendChild(askBtn);
  });
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('span:last-child');
  body.classList.toggle('open');
  arrow.textContent = body.classList.contains('open') ? '⌄' : '›';
}

// ═══════ MODE ═══════
function setMode(m, btn) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.querySelectorAll('.mode-btn')[0].classList.add('active');

  const chat = document.getElementById('chatArea');
  const input = document.getElementById('inputArea') || document.querySelector('.input-area');

  // Hide all panels
  document.querySelectorAll('.know-panel').forEach(p => p.classList.remove('active'));

  if(m === 'chat') {
    chat.style.display = 'flex';
  } else {
    chat.style.display = 'none';
    const panel = document.getElementById('panel-'+m);
    if(panel) panel.classList.add('active');
  }
}

// ═══════ TOOLS ═══════
function toggleTool(key, el) {
  tools[key] = !tools[key];
  el.classList.toggle('on', tools[key]);
  showToast(key.toUpperCase()+': '+(tools[key]?'ON':'OFF'));
}

// ═══════ IMAGE HANDLING ═══════
function handleImage(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const base64 = e.target.result.split(',')[1];
    uploadedImage = { base64, name: file.name, mimeType: file.type };
    document.getElementById('imgThumb').src = e.target.result;
    document.getElementById('imgName').textContent = file.name;
    document.getElementById('imgBar').classList.add('show');
    showToast('📷 Chart ready! Question likhke bhejo');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function removeImage() {
  uploadedImage = null;
  document.getElementById('imgBar').classList.remove('show');
  document.getElementById('imgThumb').src = '';
}

// ═══════ MESSAGES ═══════
function addMsg(isUser, text, imgSrc=null) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg'+(isUser?' user':'');

  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = isUser ? '👤' : '₹';

  const bub = document.createElement('div');
  bub.className = 'msg-bubble';

  if(imgSrc) {
    const img = document.createElement('img');
    img.src = imgSrc; img.className = 'img-preview';
    bub.appendChild(img);
  }

  const textDiv = document.createElement('div');
  textDiv.innerHTML = formatText(text);
  bub.appendChild(textDiv);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  bub.appendChild(time);

  div.appendChild(av); div.appendChild(bub);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function formatText(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{2,3} (.+)$/gm,'<div style="font-size:13px;font-weight:700;color:var(--green);margin:8px 0 4px;font-family:Orbitron,monospace;letter-spacing:1px">$1</div>')
    .replace(/^[-•] (.+)$/gm,'<div style="display:flex;gap:7px;margin:3px 0;color:var(--text2)"><span style="color:var(--green)">▸</span><span>$1</span></div>')
    .replace(/^(\d+)\. (.+)$/gm,'<div style="display:flex;gap:7px;margin:3px 0;color:var(--text2)"><span style="color:var(--green);font-weight:700;min-width:18px">$1.</span><span>$2</span></div>')
    .replace(/`([^`]+)`/g,'<code style="background:rgba(0,255,136,0.08);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--green);font-family:Share Tech Mono,monospace">$1</code>')
    .replace(/✅/g,'<span style="color:var(--green)">✅</span>')
    .replace(/❌/g,'<span style="color:var(--red)">❌</span>')
    .replace(/⚠️/g,'<span style="color:var(--yellow)">⚠️</span>')
    .replace(/🇮🇳/g,'<span style="display:inline-block;font-size:9px;font-weight:700;padding:1px 7px;border-radius:20px;margin:0 2px;background:rgba(255,136,0,0.12);color:#ffaa44;border:1px solid rgba(255,136,0,0.25)">🇮🇳 HINDI</span>')
    .replace(/🇬🇧/g,'<span style="display:inline-block;font-size:9px;font-weight:700;padding:1px 7px;border-radius:20px;margin:0 2px;background:rgba(0,255,136,0.1);color:var(--green);border:1px solid var(--border2)">🇬🇧 ENGLISH</span>')
    .replace(/\n/g,'<br>');
}

function showTyping() {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className='msg'; div.id='typing';
  div.innerHTML=`<div class="msg-av">₹</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div); area.scrollTop=area.scrollHeight;
}
function hideTyping(){ document.getElementById('typing')?.remove(); }

// ═══════ API ═══════
async function callGroq(sys, messages) {
  const res = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
    body:JSON.stringify({model:MODEL,messages:[{role:'system',content:sys},...messages],max_tokens:1000,temperature:0.6})
  });
  const data = await res.json();
  if(data.error) throw new Error(data.error.message);
  return data.choices?.[0]?.message?.content || 'Kuch galat hua.';
}

// ═══════ SEND ═══════
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if((!text && !uploadedImage) || isLoading) return;

  const imgSrc = uploadedImage ? 'data:'+uploadedImage.mimeType+';base64,'+uploadedImage.base64 : null;
  const displayText = text || '📷 Chart ka analysis karo';

  addMsg(true, displayText, imgSrc);

  // Build message content
  let userContent = text || 'Is chart ka technical analysis karo. Patterns, support/resistance, indicators kya dikh rahe hain? Trading recommendation do.';

  if(uploadedImage) {
    userContent += '\n\n[Chart image attached — please analyze the candlestick patterns, trend, support/resistance levels, and give trading recommendation]';
  }

  convHistory.push({role:'user', content: userContent});
  input.value=''; input.style.height='auto';
  removeImage();

  isLoading=true;
  document.getElementById('sendBtn').disabled=true;
  showTyping();

  // Switch to chat if not already
  if(currentMode !== 'chat') setMode('chat', document.querySelector('.mode-btn'));

  try {
    const reply = await callGroq(buildSys(), convHistory.slice(-12));
    hideTyping();
    addMsg(false, reply);
    convHistory.push({role:'assistant', content:reply});
    if(convHistory.length>20) convHistory=convHistory.slice(-16);
  } catch(e) {
    hideTyping();
    addMsg(false,'⚠️ **Error:** '+e.message+'\n\nInternet check karo.');
  }

  isLoading=false;
  document.getElementById('sendBtn').disabled=false;
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
</script>
